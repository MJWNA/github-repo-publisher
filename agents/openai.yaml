interface:
  display_name: "GitHub Repo Publisher"
  short_description: "Publish complete public or private GitHub repos."
  default_prompt: "Use $github-repo-publisher to create or polish this project as a complete GitHub repository."
policy:
  allow_implicit_invocation: true
dependencies:
  tools:
    - type: "mcp"
      value: "context7"
      description: "Current GitHub API, CLI, security, and repository documentation lookup"
    - type: "command"
      value: "gh"
      description: "GitHub CLI for repository creation, settings, API calls, releases, and verification"
