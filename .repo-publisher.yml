mode: new-repo
profile: public-oss
owner: MJWNA
repo_name: github-repo-publisher
visibility: public
description: "Codex skill for publishing complete, well-documented, secure GitHub repositories."
homepage: ""
source_path: "."
default_branch: main
license: mit
gitignore_template: ""
topics:
  - codex
  - github
  - repository-automation
  - readme
  - developer-tools
  - github-cli
maintainers:
  - "@MJWNA"
support:
  issues: true
  security_policy: SECURITY.md
settings:
  issues: true
  wiki: false
  discussions: false
  projects: false
  delete_branch_on_merge: true
  squash_merge: true
  merge_commit: false
  rebase_merge: true
security:
  dependabot: true
  codeql: false
  scorecard: true
  secret_scanning: true
  push_protection: true
verification:
  readme_completeness: true
  secret_preflight: true
  github_readback: true
