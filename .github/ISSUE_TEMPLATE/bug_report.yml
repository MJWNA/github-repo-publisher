name: Bug report
description: Report a problem with the skill, template, script, or publishing workflow.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should the skill have done instead?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Repo mode/profile, visibility, and relevant command output. Do not include secrets.
    validations:
      required: false
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Checks you ran, if any.
    validations:
      required: false
