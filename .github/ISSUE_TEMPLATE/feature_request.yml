name: Feature request
description: Suggest an improvement to the skill, templates, checks, or documentation.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What repo publishing gap should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - README guidance
        - Public repo publishing
        - Private/internal repo publishing
        - GitHub settings
        - Security
        - Release workflow
        - Templates
        - Scripts
        - Other
    validations:
      required: true
